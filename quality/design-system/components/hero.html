<!--
  Componente: Hero
  Design System: MacWave México
  Fuente CSS: style.css → .hero-section-authority, .hero-split-content
  Estado: Documentado — CSS legado activo
-->

<section class="hero-section-authority">
  <div class="container">
    <div class="hero-split-content">
      <div class="hero-content-text">
        <div class="google-review-pill">
          <span class="google-g-icon">G</span>
          <span class="google-star">★★★★★</span>
          <span class="google-rating-score">4.9</span>
          <span class="google-divider">|</span>
          <span class="google-reviews-count">100+ reseñas</span>
        </div>
        <h1>Reparación Apple a nivel componente en CDMX</h1>
        <p>Diagnóstico profesional con garantía de 2 años en baterías.</p>
        <div class="hero-actions">
          <a href="#" class="cta-button primary large-cta">Agendar diagnóstico</a>
        </div>
        <div class="certification-group">
          <img src="./images/apple.png" alt="Apple" class="cert-apple-logo">
          <div class="cert-text-lines">
            <span class="cert-line-1">TÉCNICOS</span>
            <span class="cert-line-2">CERTIFICADOS</span>
          </div>
        </div>
      </div>
      <div class="hero-img">
        <img src="./images/dispositivos.jpg" alt="Dispositivos Apple" loading="lazy">
      </div>
    </div>
  </div>
</section>

<!--
  Layout: 2 columnas desktop, stack mobile
  Padding: 120px 0
  Border-bottom: 1px solid --secondary-bg
-->
