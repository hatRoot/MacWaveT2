<!-- Solution Card (grid 3 cols) -->
<div class="solution-card">
  <div class="card-icon">🔧</div>
  <h3>Reparación de placa lógica</h3>
  <p>Diagnóstico y reparación a nivel componente.</p>
</div>

<!-- Pricing Card -->
<div class="pricing-card">
  <h3>Diagnóstico</h3>
  <div class="price-tag">$500 <span>MXN</span></div>
  <ul>
    <li>Revisión completa</li>
    <li>Reporte detallado</li>
  </ul>
  <a href="#" class="cta-button primary card-cta">Agendar</a>
</div>

<!-- Info Card (2 cols grid) -->
<div class="info-card">
  <div class="security-header">
    <h3>Seguridad empresarial</h3>
  </div>
  <p>Protección avanzada para flotas de dispositivos Apple.</p>
</div>
