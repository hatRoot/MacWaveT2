<!--
  Componente: Grid
  Design System: MacWave México
  Fuente CSS: style.css → .grid-2-cols, .grid-3-cols, .footer-grid
  Estado: Documentado — CSS legado activo
-->

<!-- Grid 3 columnas -->
<section class="solution-grid-section section-padded">
  <div class="container">
    <h2>Nuestras soluciones</h2>
    <div class="grid-3-cols">
      <div class="solution-card">Card 1</div>
      <div class="solution-card">Card 2</div>
      <div class="solution-card">Card 3</div>
    </div>
  </div>
</section>

<!-- Grid 2 columnas -->
<section class="section-padded">
  <div class="container">
    <div class="grid-2-cols">
      <div class="info-card">Columna 1</div>
      <div class="info-card">Columna 2</div>
    </div>
  </div>
</section>

<!--
  Breakpoints:
  - grid-3-cols: 3 → 2 → 1 columnas
  - grid-2-cols: 2 → 1 columna
  - footer-grid: 4 → 2 → 1 columnas
-->
