<!--
  Componente: Section
  Design System: MacWave México
  Fuente CSS: style.css → .section-padded, .light-section
  Estado: Documentado — CSS legado activo
-->

<!-- Sección oscura (default) -->
<section class="section-padded">
  <div class="container">
    <h2>Título de sección</h2>
    <p class="section-description">Descripción centrada.</p>
  </div>
</section>

<!-- Sección clara (alternating) -->
<section class="light-section section-padded">
  <div class="container">
    <h2>Sección con fondo claro</h2>
    <p>Texto oscuro sobre fondo claro.</p>
  </div>
</section>

<!--
  Variantes:
  - .section-padded: padding 120px 0
  - .light-section: fondo claro, texto oscuro
  - .ecosystem-section, .pricing-section, etc.: secciones temáticas
-->
