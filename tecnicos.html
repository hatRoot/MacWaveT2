<body class="aqua-theme">
 <a href="/" class="back-link">← Volver al sitio</a>

 <div class="itunes-window">
 <div class="itunes-header">
  <h1 class="header-title">Mac Wave T2 - Acceso Administrativo</h1>
 </div>

 <div class="itunes-content">
 <!-- Blue Aqua Apple Logo -->
 <img src="images/apple_aqua.png" alt="Apple Service" class="logo-aqua">

 <h2 style="font-size: 18px; margin-bottom: 35px; color: #333; font-weight: bold; line-height: 1.4;">
 Sistema de Gestión para<br>técnicos autorizados
 </h2>

 <form id="login-form">
 <label class="login-label">Tecnico (Email):</label>
 <input type="text" id="email" class="aqua-input" placeholder="usuario@macwave.com.mx" required>

 <label class="login-label">Contraseña:</label>
 <input type="password" id="password" class="aqua-input" placeholder="••••••••" required>

 <div id="error-message" style="color: #d00; font-size: 12px; margin-bottom: 15px; display: none;"></div>

 <button type="submit" id="submit-btn" class="gel-button">Entrar al Sistema</button>
 </form>
 </div>
 </div>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
 <script src="js/supabase-config.js"></script>
 <script src="js/ops-shared.js?v=hotfix-2c"></script>
 <script>
 const supabaseClient = MacWaveOps.createSupabaseClient();

 function normalizeAuthEmail(value) {
   return String(value || '').trim().toLowerCase();
 }

 function mapSupabaseAuthError(err) {
   const raw = err?.message || err?.error_description || String(err || '');
   const msg = String(raw || '').toLowerCase();
   if (msg.includes('invalid login credentials')) {
     return 'Email o contraseña incorrectos.';
   }
   if (msg.includes('email not confirmed')) {
     return 'Tu email aún no está confirmado en Supabase Auth.';
   }
   if (msg.includes('user not found')) {
     return 'Usuario no encontrado.';
   }
   if (msg.includes('too many requests')) {
     return 'Demasiados intentos. Espera un momento e intenta de nuevo.';
   }
   return raw || 'Error de autenticación.';
 }

 const loginForm = document.getElementById('login-form');
 const emailInput = document.getElementById('email');
 const passwordInput = document.getElementById('password');
 const errorMessage = document.getElementById('error-message');
 const submitBtn = document.getElementById('submit-btn');

 loginForm.addEventListener('submit', async (e) => {
 e.preventDefault();

 // Reset state
 errorMessage.style.display = 'none';
 submitBtn.disabled = true;
 submitBtn.textContent = 'Verificando...';

 const email = emailInput.value.trim();
 const password = passwordInput.value;

  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({
      email: email,
      password: password,
    });

    if (error) throw error;

    const authEmail = normalizeAuthEmail(data.user?.email || email);
    if (!authEmail) throw new Error('No se recibió email de la sesión. Intenta de nuevo.');

    // FIX OPS: bootstrap automático del admin real tras Auth (sin bypass).
    if (MacWaveOps.isPrimaryAdminEmail(authEmail)) {
      await MacWaveOps.ensurePrimaryAdminAccess(supabaseClient, authEmail);
    }

    const role = await MacWaveOps.resolveOpsAccess(supabaseClient, authEmail);
    if (!role) {
      await supabaseClient.auth.signOut();
      throw new Error('Tu cuenta no tiene acceso al panel técnico. Contacta al administrador.');
    }

    sessionStorage.setItem('macwave_user', authEmail);
    sessionStorage.setItem('macwave_role', role);

    window.location.href = 'dashboard-ods.html';

 } catch (error) {
 console.error('Login error:', error);
 const uiMsg = error?.name === 'AuthApiError' ? mapSupabaseAuthError(error) : (error?.message || mapSupabaseAuthError(error));
 errorMessage.textContent = uiMsg;
 errorMessage.style.display = 'block';
 } finally {
 submitBtn.disabled = false;
 submitBtn.textContent = 'Entrar al Sistema';
 }
 });
 </script>
